services:
  oidc-mock-server:
    build: .
    image: oidc-mock-server
    container_name: oidc-mock-server-1
    ports:
      - "9090:8080"
    environment:
      - OIDC_ISSUER=http://localhost:9090
      # Uncomment for verbose logging:
      # - LOGGING_LEVEL_COM_OIDCMOCK=DEBUG
    volumes:
      # Mount users.example.yaml as users.yaml, or replace with your own file.
      - ./users.example.yaml:/app/users.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]

      interval: 10s
      timeout: 5s
      retries: 3
