_format_version: "3.0"
_transform: true

services:
  - name: mockbin-service
    url: http://backend:8080
    routes:
      - name: secure-route
        paths:
          - /api/secure-data
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
              key_claim_name: kid

consumers:
  - username: oidc-user
    jwt_secrets:
      - key: demo-kid
        algorithm: RS256
