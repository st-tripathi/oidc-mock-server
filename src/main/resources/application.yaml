# OIDC Mock Server Configuration
server:
  port: 8080

spring:
  config:
    # Allows mounting a custom users.yaml (via Docker volume or local file).
    # Works both from source (./users.yaml) and in the container (/app/users.yaml).
    import: "optional:file:./users.yaml"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

oidc:
  # Issuer URL - appears in tokens and discovery document.
  # Must match the URL clients use to reach this server.
  # Override with OIDC_ISSUER env var (e.g. http://localhost:9090 when using Docker with -p 9090:8080).
  issuer: http://localhost:8080
  
  # Token lifetimes in seconds
  access-token-expiry: 3600    # 1 hour
  id-token-expiry: 3600        # 1 hour
  refresh-token-expiry: 86400  # 24 hours
  auth-code-expiry: 300        # 5 minutes
  
  # Default test users
  users:
    - username: testuser
      password: password123
      claims:
        sub: "user-001"
        email: "testuser@example.com"
        email_verified: true
        name: "Test User"
        given_name: "Test"
        family_name: "User"
        roles:
          - user
          - admin
    
    - username: alice
      password: alice123
      claims:
        sub: "user-002"
        email: "alice@example.com"
        email_verified: true
        name: "Alice Smith"
        given_name: "Alice"
        family_name: "Smith"
        roles:
          - user

  # Registered OAuth2 Clients
  clients:
    - client-id: test-client
      client-secret: test-secret
      redirect-uris:
        - http://localhost:8080/login/oauth2/code/oidc
        - http://localhost:9090/callback
        - http://localhost:3000/api/auth/callback/oidc


# Logging — override with LOGGING_LEVEL_COM_OIDCMOCK=DEBUG for verbose output
logging:
  level:
    com.oidcmock: INFO
